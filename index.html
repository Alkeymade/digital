<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHITE BRONCO // EMISSION</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: monospace;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            z-index: 1;
            pointer-events: none;
            transition: filter 0.05s ease;
            /* Removed mix-blend-mode to prevent dark tones from vanishing */
        }
        #gate {
            position: relative;
            z-index: 10;
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 5px;
            border: 1px solid #ffffff;
            padding: 15px 25px;
            background: #000000;
            color: #ffffff;
            transition: all 0.3s ease;
        }
        #gate:hover {
            background: #ffffff;
            color: #000000;
        }
        #mainframe {
            display: none;
            position: relative;
            z-index: 10;
            font-size: 11px;
            letter-spacing: 3px;
            color: #ffffff;
            text-shadow: 0 0 8px #000000;
            text-align: center;
            line-height: 2;
            background: rgba(0, 0, 0, 0.75);
            padding: 20px;
            border: 1px solid #222222;
        }
        .highlight {
            color: #ff3333;
        }
    </style>
</head>
<body>

    <button id="gate">[ DECONSTRUCT_BRONCO ]</button>
    
    <div id="mainframe">
        <div id="status">EXTRACTING_SIGNAL...</div>
        <div id="telemetry">OFFSET: 0.00s | RATE: 1.00x</div>
    </div>

    <video id="bg-video" src="./background.mp4" loop muted playsinline></video>

    <script>
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;
        let mainBuffer = null;
        let isRunning = false;

        const gate = document.getElementById('gate');
        const mainframe = document.getElementById('mainframe');
        const statusDiv = document.getElementById('status');
        const telemetryDiv = document.getElementById('telemetry');
        const video = document.getElementById('bg-video');

        // 1. Load Audio Archive
        async function loadSignal() {
            try {
                const response = await fetch('./white_bronco.mp3');
                if (!response.ok) throw new Error("AUDIO_404");
                
                const arrayBuffer = await response.arrayBuffer();
                statusDiv.innerText = "DECODING_ARCHIVE_DATA...";
                mainBuffer = await audioCtx.decodeAudioData(arrayBuffer);
                
                statusDiv.innerHTML = "SYSTEM_ONLINE // <span class='highlight'>MUTATING</span>";
                
                isRunning = true;
                emitGrain();
            } catch (err) {
                statusDiv.innerHTML = "ERR: ARCHIVE FAILED. CHECK FILE PLACEMENT.";
                console.error(err);
            }
        }

        // 2. The Integrated Deconstructor Loop
        function emitGrain() {
            if (!isRunning || !mainBuffer) return;

            const source = audioCtx.createBufferSource();
            source.buffer = mainBuffer;

            const duration = mainBuffer.duration;
            const randomOffset = Math.random() * (duration - 2); 
            const sliceLength = 0.3 + (Math.random() * 1.2); 
            
            const rates = [0.4, 0.7, 1.0, 1.0, 1.0, 1.3]; 
            const randomRate = rates[Math.floor(Math.random() * rates.length)];

            source.playbackRate.value = randomRate;
            source.connect(audioCtx.destination);
            source.start(0, randomOffset, sliceLength);

            // --- VIDEO MUTATION LOGIC ---
            video.playbackRate = randomRate;
            
            if (Math.random() > 0.6) {
                video.currentTime = Math.random() * video.duration;
            }

            if (Math.random() > 0.75) {
                video.style.filter = `brightness(250%) contrast(300%) grayscale(100%)`;
            } else if (Math.random() > 0.92) {
                video.style.filter = `invert(100%) contrast(200%)`;
            } else {
                video.style.filter = `none`;
            }

            setTimeout(() => {
                video.style.filter = "none";
            }, 50);

            telemetryDiv.innerText = `OFFSET: ${randomOffset.toFixed(2)}s | RATE: ${randomRate.toFixed(2)}x | LEN: ${sliceLength.toFixed(2)}s`;

            const nextTrigger = (sliceLength / randomRate) * 1000;
            const delay = Math.random() > 0.85 ? nextTrigger * 0.25 : nextTrigger;

            setTimeout(emitGrain, delay);
        }

        // 3. System Ignition
        gate.addEventListener('click', () => {
            gate.style.display = 'none';
            mainframe.style.display = 'block';
            
            // FIX: Fire the video immediately on click so iOS doesn't block it
            video.play().catch(err => console.log("Video click playback intercepted:", err));
            
            audioCtx = new AudioContext();
            loadSignal();
        });
    </script>
</body>
</html>

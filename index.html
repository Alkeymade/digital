<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WHITE BRONCO</title>
    <style>
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        #gate {
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 4px;
            transition: opacity 0.5s ease;
        }
        #gate:hover {
            color: #888888;
        }
        #status {
            display: none;
            font-size: 11px;
            letter-spacing: 2px;
            color: #444444;
        }
    </style>
</head>
<body>

    <div id="gate">[ TRANSMISSION_01 ]</div>
    <div id="status">SIGNAL_ACTIVE</div>

    <audio id="audio-player" src="white_bronco.mp3" loop></audio>

    <script>
        const gate = document.getElementById('gate');
        const status = document.getElementById('status');
        const player = document.getElementById('player');

        gate.addEventListener('click', () => {
            gate.style.display = 'none';
            status.style.display = 'block';
            
            player.play().catch(error => {
                status.innerText = "LINK_BROKEN";
                console.error("Audio failed to play:", error);
            });
        });
    </script>
</body>
</html>
